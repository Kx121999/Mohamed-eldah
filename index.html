<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الشيخ محمد منتصر الدح | كروان آل البيت</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Amiri:wght@400;700&display=swap');

:root {
  --bg: #0a1210;
  --bg-card: #121f1a;
  --gold: #c9a961;
  --gold-light: #e6d5a8;
  --text: #f8f8f6;
  --text-dim: #a8a8a0;
  --border: rgba(201, 169, 97, 0.15);
}

* {margin:0; padding:0; box-sizing:border-box; scroll-behavior: smooth;}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  overflow-x: hidden;
}

body.lightbox-open {
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0 L100 50 L50 100 L0 50 Z' fill='%23c9a961' fill-opacity='0.02'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.container {max-width: 1280px; margin: auto; padding: 0 40px; position: relative; z-index: 1;}

/* Hero Section */
.hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  align-items: center;
  gap: 60px;
  padding: 100px 0;
}

.hero-content {animation: fadeInRight 1s ease;}

.hero-image {
  position: relative;
  border-radius: 24px;
  overflow: hidden;
  border: 3px solid var(--gold);
  box-shadow: 0 30px 80px rgba(201, 169, 97, 0.25);
  animation: fadeInLeft 1s ease;
}

.hero-image img {
  width: 100%;
  height: 700px;
  object-fit: cover;
  display: block;
}

.hero-image::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 0%, rgba(10, 18, 16, 0.8) 100%);
}

.bismillah {
  font-family: 'Amiri', serif;
  font-size: 2.2rem;
  color: var(--gold);
  margin-bottom: 30px;
}

h1 {
  font-family: 'Amiri', serif;
  font-size: 4.5rem;
  font-weight: 700;
  line-height: 1.2;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 20px;
}

.hero-subtitle {
  font-size: 1.4rem;
  color: var(--text-dim);
  font-weight: 300;
  margin-bottom: 25px;
}

.divider {
  width: 80px;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 30px 0;
}

.hero-verse {
  font-family: 'Amiri', serif;
  font-size: 1.3rem;
  color: var(--gold-light);
  line-height: 2.2;
  margin-bottom: 40px;
}

.btn-group {
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
}

.btn {
  padding: 16px 42px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
  font-size: 1.05rem;
  transition: all 0.3s ease;
  border: 2px solid var(--gold);
  cursor: pointer;
}

.btn-primary {
  background: var(--gold);
  color: var(--bg);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(201, 169, 97, 0.4);
}

.btn-ghost {
  background: transparent;
  color: var(--gold);
}

.btn-ghost:hover {
  background: var(--gold);
  color: var(--bg);
}

/* Sections */
section {padding: 120px 0;}

.section-header {
  text-align: center;
  margin-bottom: 80px;
}

.section-title {
  font-family: 'Amiri', serif;
  font-size: 3.2rem;
  color: var(--gold);
  margin-bottom: 20px;
}
